{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>Crear cuenta</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-dark w-100">Registrarse</button>
        </form>
        <p class="mt-3">¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión</a></p>
    </div>
</div>
{% endblock %}
