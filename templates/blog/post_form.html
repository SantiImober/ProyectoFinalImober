{% extends 'base.html' %}

{% block title %}Post{% endblock %}

{% block content %}
<h2>{% if object %}Editar{% else %}Nuevo{% endif %} Post</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-dark">Guardar</button>
    <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
