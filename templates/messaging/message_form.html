{% extends 'base.html' %}

{% block title %}Nuevo mensaje{% endblock %}

{% block content %}
<h2>Enviar mensaje</h2>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Para:</label>
        <select name="receiver" class="form-select">
            {% for user in users %}
                <option value="{{ user.id }}" {% if user.id|stringformat:"s" == receiver_id %}selected{% endif %}>
                    {{ user.username }}
                </option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Mensaje:</label>
        <textarea name="content" class="form-control" rows="4" required></textarea>
    </div>
    <button type="submit" class="btn btn-dark">Enviar</button>
    <a href="{% url 'inbox' %}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
